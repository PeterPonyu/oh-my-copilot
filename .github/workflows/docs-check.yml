name: Docs Check

on:
  pull_request:
  push:
    branches: [main]

jobs:
  validate-docs:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Validate docs-first research repository
        run: bash scripts/validate-doc-links.sh
      - name: Validate power surfaces
        run: bash scripts/validate-power-surfaces.sh
      - name: Validate root Copilot surfaces
        run: bash scripts/validate-root-copilot-surfaces.sh
