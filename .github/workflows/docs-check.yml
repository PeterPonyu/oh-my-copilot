name: docs-check

on:
  pull_request:
    paths:
      - "**/*.md"
      - "scripts/validate-doc-links.sh"
      - ".github/workflows/docs-check.yml"
  push:
    branches: [main]
    paths:
      - "**/*.md"
      - "scripts/validate-doc-links.sh"
      - ".github/workflows/docs-check.yml"

jobs:
  validate-doc-links:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate internal markdown links
        run: scripts/validate-doc-links.sh
